version: '3.9'

services:
  client:
    build:
      context: ../../client
      dockerfile: ../devops/docker/client/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000/api

  server:
    build:
      context: ../../server
      dockerfile: ../devops/docker/server/Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    env_file:
      - ../../server/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/propmanager
      - REDIS_URL=redis://redis:6379

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      - client
      - server

volumes:
  mongo_data:
  redis_data:
